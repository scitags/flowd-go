# What should the action be called?
name: New Workflow

# We'll run tests whenever something's pushed
on: push

# Let's define what we want to do!
jobs:
  base:
    name: Prep time!
    uses: ./.github/workflows/dbg.yml@main

  test:
    name: Test it!
    needs: base
    uses: ./.github/workflows/test.yml@main

  build:
    name: "Build it!"
    needs: test
    uses: ./.github/workflows/build.yml@main

  srpm:
    name: SRPM time!
    needs: build
    uses: ./.github/workflows/srpm.yml@main

  rpm-x86_64:
    name: Build the x86_64 RPM
    needs: srpm
    uses: ./.github/workflows/rpm.yml@main
    with:
      target-arch: x86_64
      target-runner: ubuntu-latest

  rpm-aarch64:
    name: Build the aarch64 RPM
    needs: srpm
    uses: ./.github/workflows/rpm.yml@main
    with:
      target-arch: aarch64
      target-runner: ubuntu-24.04-arm
